{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SBA{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/scss/style.css' %}">


  <style>
    /* styles for the buttons and tables used across the app*/
    /* Zebra striping */
    .table tbody tr:nth-child(odd) { background: #F8FAFC; }
    .table tbody tr:nth-child(even) { background: #FFFFFF; }
    /* Center headers and cells */
    .table th, .table td { text-align: center; vertical-align: middle; }
    /* Keep nice padding */
    .table th { padding: 14px 18px !important; }
    .table td { padding: 14px 18px !important; }
    /* Drawer and overlay */
    .overlay-mask { position: fixed; inset: 0; background: rgba(17,24,39,.5); display: none; z-index: 1000; }
    .drawer { position: fixed; top: 0; right: -440px; width: 420px; max-width: 100vw; height: 100%; background: #fff; box-shadow: -2px 0 16px rgba(0,0,0,.08); transition: right .25s ease; z-index: 1001; padding: 20px; overflow-y: auto; box-sizing: border-box; }
    .drawer.active { right: 0; }
    .btn-primary { background:#111827;color:#fff;border:none;border-radius:8px;padding:.5rem .9rem; cursor:pointer; }
    .btn-secondary { background:#F3F4F6;color:#111827;border:1px solid #E5E7EB;border-radius:8px;padding:.5rem .9rem; cursor:pointer; }
    .form-field { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; text-align:left; }
    .form-field label { font-size:12px; color:#6B7280; }
    .form-field input,
    .form-field select,
    .form-field textarea { border:1px solid #E5E7EB; border-radius:8px; padding:10px 12px; width:100%; box-sizing:border-box; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% include 'partials/sidebar.html' %}
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <main class="main-content">
    {% include 'partials/header.html' %}
    <div class="page-content">
      {% block content %}{% endblock %}
    </div>
  </main>
  {% block extra_js %}
  <script>
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebarToggle');
    const overlay = document.getElementById('sidebarOverlay');

    function isMobile() { return window.innerWidth <= 767; }

    function setToggleVisibility() {
      if (!toggleBtn) return;
      toggleBtn.style.display = isMobile() ? 'flex' : 'none';
      // Si el sidebar está abierto en mobile, ocultar el botón
      if (isMobile() && sidebar.classList.contains('active')) {
        toggleBtn.style.display = 'none';
      }
    }

    function toggleSidebar(forceState) {
      const willOpen = forceState !== undefined ? forceState : !sidebar.classList.contains('active');
      if (willOpen) {
        sidebar.classList.add('active');
        overlay.style.display = 'block';
        if (isMobile() && toggleBtn) toggleBtn.style.display = 'none';
      } else {
        sidebar.classList.remove('active');
        overlay.style.display = 'none';
        if (toggleBtn) toggleBtn.style.display = isMobile() ? 'flex' : 'none';
      }
    }

    toggleBtn?.addEventListener('click', () => toggleSidebar());
    overlay?.addEventListener('click', () => toggleSidebar(false));

    // Cierra el sidebar al navegar entre links (mobile)
    document.querySelectorAll('.sidebar a.sidebar-link')?.forEach(a => {
      a.addEventListener('click', () => toggleSidebar(false));
    });

    // Estado inicial y al redimensionar
    setToggleVisibility();
    window.addEventListener('resize', setToggleVisibility);
  </script>
  <script>
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
    }
  </script>
  {% endblock %}
</body>
</html>
