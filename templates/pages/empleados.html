{% extends 'layouts/base.html' %}
{% block title %}Empleados | SBA{% endblock %}
{% block content %}
<section>
  <div style="max-width:100%;margin:24px auto 0;padding:0 16px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:12px;">
      <div>
        <h1 style="font-size:28px;font-weight:700;margin:24px 0 6px 0;">Empleados</h1>
        <div style="color:#6B7280;margin-bottom:20px;">De la compañía</div>
      </div>
      <button type="button" class="btn-primary" onclick="openEmployeeDrawer()">Crear nuevo</button>
    </div>

    <div class="card table-card" style="padding:0;margin-top:12px;">
      <div style="display:flex;align-items:center;padding:16px 20px;gap:12px;background:#62328A;color:#ffffff;border-radius:0.5rem 0.5rem 0 0;">
        <div style="flex:1;min-width:0;">
          <h2 style="font-size:16px;margin:0;color:#ffffff;">Listado</h2>
        </div>
        <div style="flex:0 0 auto;display:flex;justify-content:center;min-width:0;">
          <input id="employeesSearch" type="text" placeholder="Buscar..." aria-label="Buscar empleados" style="width:320px;max-width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:8px;">
        </div>
        <div style="flex:1;min-width:0;"></div>
      </div>

      <div class="table-container">
        <table class="table" style="width:100%;border-collapse:collapse;">
          <thead>
            <tr>
              <th class="table-header" style="padding:14px 18px;">Nombre</th>
              <th class="table-header" style="padding:14px 18px;">Email</th>
              <th class="table-header" style="padding:14px 18px;">Teléfono</th>
              <th class="table-header" style="padding:14px 18px;">Documento</th>
              <th class="table-header" style="padding:14px 18px;">Puesto</th>
              <th class="table-header" style="padding:14px 18px;">Departamento</th>
              <th class="table-header" style="padding:14px 18px;">Fecha alta</th>
              <th class="table-header" style="padding:14px 18px;">Estado</th>
              <th class="table-header" style="padding:14px 18px;">Acciones</th>
            </tr>
          </thead>
          <tbody class="employees-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Overlay and Drawer -->
  <div id="employeeOverlay" class="overlay-mask" onclick="closeEmployeeDrawer()"></div>
  <aside id="employeeDrawer" class="drawer" aria-hidden="true">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3 style="margin:0;font-size:18px;">Crear empleado</h3>
      <button class="btn-secondary" onclick="closeEmployeeDrawer()">Cerrar</button>
    </div>
    <form id="employeeForm" onsubmit="submitEmployee(event)">
      <div style="display:grid;grid-template-columns:repeat(2, minmax(0,1fr));gap:12px;">
        <div class="form-field">
          <label>Nombre</label>
          <input type="text" name="first_name" required>
        </div>
        <div class="form-field">
          <label>Apellido</label>
          <input type="text" name="last_name" required>
        </div>
        <div class="form-field">
          <label>Email</label>
          <input type="email" name="email">
        </div>
        <div class="form-field">
          <label>Teléfono</label>
          <input type="text" name="phone">
        </div>
        <div class="form-field">
          <label>Tipo de documento</label>
          <input type="text" name="document_type">
        </div>
        <div class="form-field">
          <label>Número de documento</label>
          <input type="text" name="document_number">
        </div>
        <div class="form-field">
          <label>Categoría profesional</label>
          <input type="text" name="job_position" required>
        </div>
        <div class="form-field">
          <label>Departamento</label>
          <input type="text" name="department">
        </div>
        <div class="form-field">
          <label>Dirección</label>
          <input type="text" name="address">
        </div>
        <div class="form-field">
          <label>Fecha de nacimiento</label>
          <input type="date" name="date_of_birth">
        </div>
        <div class="form-field">
          <label>Tipo de contrato</label>
          <select name="contract_type">
            <option value="indefinido">Indefinido</option>
            <option value="temporal">Temporal</option>
            <option value="practicas">En Prácticas</option>
            <option value="formacion">Formación</option>
            <option value="obra">Obra y Servicio</option>
          </select>
        </div>
        <div class="form-field">
          <label>Fecha de alta</label>
          <input type="date" name="hire_date">
        </div>
        <div class="form-field">
          <label>Fecha de baja</label>
          <input type="date" name="termination_date">
        </div>
        <div class="form-field" style="display:flex;align-items:center;gap:8px;">
          <input type="checkbox" id="is_active" name="is_active" checked>
          <label for="is_active" style="margin:0;">Activo</label>
        </div>
        <div class="form-field">
          <label>Nº Afiliación SS</label>
          <input type="text" name="social_security_number">
        </div>
        <div class="form-field">
          <label>IBAN</label>
          <input type="text" name="bank_account">
        </div>
        <div class="form-field" style="grid-column:1 / -1;">
          <label>Convenio colectivo</label>
          <input type="text" name="collective_agreement">
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px;">
        <button type="button" class="btn-secondary" onclick="closeEmployeeDrawer()">Cancelar</button>
        <button type="submit" class="btn-primary">Guardar</button>
      </div>
    </form>
  </aside>

</section>

<script>
let EMPLOYEES_DATA = [];

document.addEventListener('DOMContentLoaded', function() {
  loadEmployees();
  setupEmployeesSearch();
});

function renderEmployeesTable(rows) {
  const tbody = document.querySelector('.employees-tbody');
  if (!tbody) return;
  tbody.innerHTML = '';

  if (!rows || rows.length === 0) {
    tbody.innerHTML = '<tr><td class="table-cell" colspan="9" style="color:#6B7280;padding:18px;">No hay empleados registrados.</td></tr>';
    return;
  }

  rows.forEach(e => {
    const fullName = `${e.first_name || ''} ${e.last_name || ''}`.trim() || '-';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="table-cell" style="padding:14px 18px;">${fullName}</td>
      <td class="table-cell" style="padding:14px 18px;">${e.email || '-'}</td>
      <td class="table-cell" style="padding:14px 18px;">${e.phone || '-'}</td>
      <td class="table-cell" style="padding:14px 18px;">${e.document || '-'}</td>
      <td class="table-cell" style="padding:14px 18px;">${e.job_position || '-'}</td>
      <td class="table-cell" style="padding:14px 18px;">${e.department || '-'}</td>
      <td class="table-cell" style="padding:14px 18px;">${e.hire_date || '-'}</td>
      <td class="table-cell" style="padding:14px 18px;">${e.is_active ? 'Activo' : 'Inactivo'}</td>
      <td class="table-cell" style="padding:14px 18px;">
        <div style="display:flex; gap:8px; justify-content:center;">
          <button class="btn-secondary" style="padding:.35rem .6rem; font-size:12px;" onclick="editEmployee(${e.id})">Editar</button>
          <button class="btn-primary" style="background:#DC2626; padding:.35rem .6rem; font-size:12px;" onclick="deleteEmployee(${e.id})">Eliminar</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function setupEmployeesSearch() {
  const input = document.getElementById('employeesSearch');
  if (!input) return;
  input.addEventListener('input', (e) => {
    const term = (e.target.value || '').trim().toLowerCase();
    const rows = filterEmployees(term);
    renderEmployeesTable(rows);
  });
}

function filterEmployees(term) {
  if (!term) return EMPLOYEES_DATA;
  return EMPLOYEES_DATA.filter(e => {
    const fields = [
      e.first_name,
      e.last_name,
      e.email,
      e.phone,
      e.document,
      e.job_position,
      e.department,
      e.hire_date,
      e.is_active ? 'activo' : 'inactivo',
    ];
    return fields.some(v => (v || '').toString().toLowerCase().includes(term));
  });
}

function loadEmployees() {
  fetch('/api/show-table-employees/', {
    headers: { 'X-Requested-With': 'XMLHttpRequest' }
  })
  .then(r => r.json())
  .then(data => {
    EMPLOYEES_DATA = (data.employees || []);
    const input = document.getElementById('employeesSearch');
    const term = input ? (input.value || '').trim().toLowerCase() : '';
    const rows = term ? filterEmployees(term) : EMPLOYEES_DATA;
    renderEmployeesTable(rows);
  })
  .catch(err => {
    console.error(err);
    const tbody = document.querySelector('.employees-tbody');
    if (tbody) tbody.innerHTML = '<tr><td class="table-cell" colspan="9" style="padding:18px;">Error al cargar empleados</td></tr>';
  });
}

let currentEditEmployeeId = null;

function openEmployeeDrawer() {
  document.getElementById('employeeOverlay').style.display = 'block';
  document.getElementById('employeeDrawer').classList.add('active');
}

function closeEmployeeDrawer() {
  document.getElementById('employeeOverlay').style.display = 'none';
  document.getElementById('employeeDrawer').classList.remove('active');
  currentEditEmployeeId = null;
  const title = document.querySelector('#employeeDrawer h3');
  if (title) title.textContent = 'Crear empleado';
  const form = document.getElementById('employeeForm');
  if (form) form.reset();
  const active = document.getElementById('is_active');
  if (active) active.checked = true;
}

async function submitEmployee(evt) {
  if (evt) evt.preventDefault();
  const form = document.getElementById('employeeForm');
  const fd = new FormData(form);
  // Convert checkbox to boolean
  const payload = Object.fromEntries(fd.entries());
  payload.is_active = !!fd.get('is_active');

  const isEdit = !!currentEditEmployeeId;
  const url = isEdit ? `/api/employees/${currentEditEmployeeId}/update/` : '/api/employees/create/';
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken'),
        'X-Requested-With': 'XMLHttpRequest',
      },
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      let msg = 'Error al guardar.';
      try { const data = await res.json(); if (data.error) msg = data.error; } catch(_){}
      throw new Error(msg);
    }
    closeEmployeeDrawer();
    loadEmployees();
  } catch (err) {
    alert(err.message || 'Error al guardar.');
  }
}

async function editEmployee(id) {
  currentEditEmployeeId = id;
  const title = document.querySelector('#employeeDrawer h3');
  if (title) title.textContent = 'Editar empleado';
  openEmployeeDrawer();
  try {
    const res = await fetch(`/api/employees/${id}/`, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
    if (!res.ok) throw new Error('No se pudo cargar el empleado');
    const data = await res.json();
    const e = data.employee || {};
    const form = document.getElementById('employeeForm');
    form.elements['first_name'].value = e.first_name || '';
    form.elements['last_name'].value = e.last_name || '';
    form.elements['email'].value = e.email || '';
    form.elements['phone'].value = e.phone || '';
    form.elements['document_type'].value = e.document_type || '';
    form.elements['document_number'].value = e.document_number || '';
    form.elements['job_position'].value = e.job_position || '';
    form.elements['department'].value = e.department || '';
    form.elements['address'].value = e.address || '';
    form.elements['date_of_birth'].value = e.date_of_birth || '';
    form.elements['contract_type'].value = e.contract_type || 'indefinido';
    form.elements['hire_date'].value = e.hire_date || '';
    form.elements['termination_date'].value = e.termination_date || '';
    form.elements['social_security_number'].value = e.social_security_number || '';
    form.elements['bank_account'].value = e.bank_account || '';
    form.elements['collective_agreement'].value = e.collective_agreement || '';
    const active = document.getElementById('is_active');
    if (active) active.checked = !!e.is_active;
  } catch (err) {
    alert(err.message || 'Error al cargar empleado');
  }
}

async function deleteEmployee(id) {
  if (!confirm('¿Seguro que deseas eliminar este empleado?')) return;
  try {
    const res = await fetch(`/api/employees/${id}/delete/`, {
      method: 'POST',
      headers: {
        'X-CSRFToken': getCookie('csrftoken'),
        'X-Requested-With': 'XMLHttpRequest',
      },
    });
    if (!res.ok) {
      let msg = 'Error al eliminar.';
      try { const data = await res.json(); if (data.error) msg = data.error; } catch(_){}
      throw new Error(msg);
    }
    loadEmployees();
  } catch (err) {
    alert(err.message || 'Error al eliminar.');
  }
}
</script>
{% endblock %}
