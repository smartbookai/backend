{% extends 'layouts/base.html' %}
{% block title %}Proveedores | SBA{% endblock %}
{% block extra_head %}
<style>
  /* Zebra striping */
  .table tbody tr:nth-child(odd) { background: #F8FAFC; }
  .table tbody tr:nth-child(even) { background: #FFFFFF; }
  /* Center headers and cells */
  .table th, .table td { text-align: center; vertical-align: middle; }
  /* Keep nice padding */
  .table th { padding: 14px 18px !important; }
  .table td { padding: 14px 18px !important; }
  /* Drawer and overlay */
  .overlay-mask { position: fixed; inset: 0; background: rgba(17,24,39,.5); display: none; z-index: 1000; }
  .drawer { position: fixed; top: 0; right: -440px; width: 420px; height: 100%; background: #fff; box-shadow: -2px 0 16px rgba(0,0,0,.08); transition: right .25s ease; z-index: 1001; padding: 20px; overflow-y: auto; }
  .drawer.active { right: 0; }
  .btn-primary { background:#111827;color:#fff;border:none;border-radius:8px;padding:.5rem .9rem; cursor:pointer; }
  .btn-secondary { background:#F3F4F6;color:#111827;border:1px solid #E5E7EB;border-radius:8px;padding:.5rem .9rem; cursor:pointer; }
  .form-field { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; text-align:left; }
  .form-field label { font-size:12px; color:#6B7280; }
  .form-field input { border:1px solid #E5E7EB; border-radius:8px; padding:10px 12px; }
</style>
{% endblock %}
{% block content %}
<section>
  <div style="max-width:100%;margin:24px auto 0;padding:0 16px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:12px;">
      <div>
        <h1 style="font-size:28px;font-weight:700;margin:24px 0 6px 0;">Proveedores</h1>
        <div style="color:#6B7280;margin-bottom:20px;">De la compañía</div>
      </div>
      <button type="button" class="btn-primary" onclick="openSupplierDrawer()">Crear nuevo</button>
    </div>

    <div class="card table-card" style="padding:0;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;">
        <div>
          <h2 style="font-size:16px;margin:0;">Listado</h2>
        </div>
        <!--<a href="#" class="link-blue">Ver todos</a>-->
      </div>

      <div class="table-container">
        <table class="table" style="width:100%;border-collapse:collapse;">
          <thead>
            <tr>
              <th class="table-header" style="padding:14px 18px;">Proveedor</th>
              <th class="table-header" style="padding:14px 18px;">Contacto</th>
              <th class="table-header" style="padding:14px 18px;">Teléfono</th>
              <th class="table-header" style="padding:14px 18px;">Email</th>
              <th class="table-header" style="padding:14px 18px;">Documento</th>
              <th class="table-header" style="padding:14px 18px;">Dirección</th>
              <th class="table-header" style="padding:14px 18px;">Acciones</th>
            </tr>
          </thead>
          <tbody class="suppliers-tbody">
            <!--<tr>
              <td class="table-cell" colspan="7" style="color:#6B7280;padding:18px;">Cargando...</td>
            </tr> -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Overlay and Drawer -->
  <div id="supplierOverlay" class="overlay-mask" onclick="closeSupplierDrawer()"></div>
  <aside id="supplierDrawer" class="drawer" aria-hidden="true">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3 style="margin:0;font-size:18px;">Crear proveedor</h3>
      <button class="btn-secondary" onclick="closeSupplierDrawer()">Cerrar</button>
    </div>
    <form id="supplierForm" onsubmit="submitSupplier(event)">
      <div class="form-field">
        <label>Nombre</label>
        <input type="text" name="name" required>
      </div>
      <div class="form-field">
        <label>Persona de contacto</label>
        <input type="text" name="contact_person">
      </div>
      <div class="form-field">
        <label>Teléfono</label>
        <input type="text" name="phone">
      </div>
      <div class="form-field">
        <label>Email</label>
        <input type="email" name="email">
      </div>
      <div class="form-field">
        <label>Tipo de documento</label>
        <input type="text" name="document_type">
      </div>
      <div class="form-field">
        <label>Número de documento</label>
        <input type="text" name="document_number">
      </div>
      <div class="form-field">
        <label>Dirección</label>
        <input type="text" name="address">
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px;">
        <button type="button" class="btn-secondary" onclick="closeSupplierDrawer()">Cancelar</button>
        <button type="submit" class="btn-primary">Guardar</button>
      </div>
    </form>
  </aside>

</section>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadSuppliers();
});
</script>

<script>
function loadSuppliers() {
  fetch('/api/show-table-suppliers/', {
    headers: { 'X-Requested-With': 'XMLHttpRequest' }
  })
  .then(r => r.json())
  .then(data => {
    const tbody = document.querySelector('.suppliers-tbody');
    if (!tbody) return;
    tbody.innerHTML = '';

    const rows = (data.suppliers || []);
    if (rows.length === 0) {
      tbody.innerHTML = '<tr><td class="table-cell" colspan="7" style="color:#6B7280;padding:18px;">No hay proveedores registrados.</td></tr>';
      return;
    }

    rows.forEach(s => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="table-cell" style="padding:14px 18px;">${s.name || '-'}</td>
        <td class="table-cell" style="padding:14px 18px;">${s.contact_person || '-'}</td>
        <td class="table-cell" style="padding:14px 18px;">${s.phone || '-'}</td>
        <td class="table-cell" style="padding:14px 18px;">${s.email || '-'}</td>
        <td class="table-cell" style="padding:14px 18px;">${s.document || '-'}</td>
        <td class="table-cell" style="padding:14px 18px;">${s.address || '-'}</td>
        <td class="table-cell" style="padding:14px 18px;"><a href="#" class="link-blue">Ver detalles</a></td>
      `;
      tbody.appendChild(tr);
    });
  })
  .catch(err => {
    console.error(err);
    const tbody = document.querySelector('.suppliers-tbody');
    if (tbody) tbody.innerHTML = '<tr><td class="table-cell" colspan="7" style="padding:18px;">Error al cargar proveedores</td></tr>';
  });
}

// Drawer handlers
function openSupplierDrawer() {
  document.getElementById('supplierOverlay').style.display = 'block';
  document.getElementById('supplierDrawer').classList.add('active');
}
function closeSupplierDrawer() {
  document.getElementById('supplierOverlay').style.display = 'none';
  document.getElementById('supplierDrawer').classList.remove('active');
}
function submitSupplier(e) {
  e.preventDefault();
  // Aquí luego puedes hacer fetch POST al endpoint de creación
  // Por ahora solo cerramos y recargamos la tabla
  closeSupplierDrawer();
  loadSuppliers();
}
</script>

{% endblock content %}
