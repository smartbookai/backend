{% extends 'layouts/base.html' %}
{% block title %}Clientes | SBA{% endblock %}
{% block content %}
<section>
  <div style="max-width:100%;margin:24px auto 0;padding:0 16px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:12px;">
      <div>
        <h1 style="font-size:28px;font-weight:700;margin:24px 0 6px 0;">Clientes</h1>
        <div style="color:#6B7280;margin-bottom:20px;">De la compañía</div>
      </div>
      {% if request.user.company_user.role == 'admin' %}
      <button type="button" class="btn-primary" onclick="openClientDrawer()">Crear nuevo</button>
      {% endif %}
    </div>

    <div class="card table-card" style="padding:0;margin-top:12px;">
      <div style="display:flex;align-items:center;padding:16px 20px;gap:12px;background:#62328A;color:#ffffff;border-radius:0.5rem 0.5rem 0 0;">
        <div style="flex:1;min-width:0;">
          <h2 style="font-size:16px;margin:0;color:#ffffff;">Listado</h2>
        </div>
        <div style="flex:0 0 auto;display:flex;justify-content:center;min-width:0;">
          <input id="clientsSearch" type="text" placeholder="Buscar..." aria-label="Buscar clientes" style="width:320px;max-width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:8px;">
        </div>
        <div style="flex:1;min-width:0;"></div>
      </div>

      <div class="table-container">
        <table class="table" style="width:100%;border-collapse:collapse;">
          <thead>
            <tr>
              <th class="table-header" style="padding:14px 18px;">Cliente</th>
              <th class="table-header" style="padding:14px 18px;">Contacto</th>
              <th class="table-header" style="padding:14px 18px;">Teléfono</th>
              <th class="table-header" style="padding:14px 18px;">Email</th>
              <th class="table-header" style="padding:14px 18px;">Documento</th>
              <th class="table-header" style="padding:14px 18px;">Dirección</th>
              <th class="table-header" style="padding:14px 18px;">Acciones</th>
            </tr>
          </thead>
          <tbody class="clients-tbody">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Overlay and Drawer -->
  <div id="clientOverlay" class="overlay-mask" onclick="closeClientDrawer()"></div>
  <aside id="clientDrawer" class="drawer" aria-hidden="true">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3 style="margin:0;font-size:18px;">Crear cliente</h3>
      <button class="btn-secondary" onclick="closeClientDrawer()">Cerrar</button>
    </div>
    <form id="clientForm" onsubmit="submitClient(event)">
      <div class="form-field">
        <label>Nombre</label>
        <input type="text" name="name" required>
      </div>
      <div class="form-field">
        <label>Persona de contacto</label>
        <input type="text" name="contact_person">
      </div>
      <div class="form-field">
        <label>Teléfono</label>
        <input type="text" name="phone">
      </div>
      <div class="form-field">
        <label>Email</label>
        <input type="email" name="email">
      </div>
      <div class="form-field">
        <label>Tipo de documento</label>
        <input type="text" name="document_type">
      </div>
      <div class="form-field">
        <label>Número de documento</label>
        <input type="text" name="document_number">
      </div>
      <div class="form-field">
        <label>Dirección</label>
        <input type="text" name="address">
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px;">
        <button type="button" class="btn-secondary" onclick="closeClientDrawer()">Cancelar</button>
        <button type="submit" class="btn-primary">Guardar</button>
      </div>
    </form>
  </aside>

</section>

<script>
const IS_ADMIN = '{% if request.user.company_user.role == "admin" %}admin{% else %}other{% endif %}' === 'admin';
let currentEditClientId = null;
let CLIENTS_DATA = [];

document.addEventListener('DOMContentLoaded', function() {
  loadClients();
  setupClientsSearch();
  const params = new URLSearchParams(window.location.search);
  if (params.get('openDrawer') === 'client') {
    openClientDrawer();
  }
});

function renderClientsTable(rows) {
  const tbody = document.querySelector('.clients-tbody');
  if (!tbody) return;
  tbody.innerHTML = '';

  if (!rows || rows.length === 0) {
    tbody.innerHTML = '<tr><td class="table-cell" colspan="7" style="color:#6B7280;padding:18px;">No hay clientes registrados.</td></tr>';
    return;
  }

  rows.forEach(c => {
    const actions = IS_ADMIN
      ? `
        <div style=\"display:flex; gap:8px; justify-content:center;\">
          <button class=\"btn-secondary\" style=\"padding:.35rem .6rem; font-size:12px;\" onclick=\"editClient(${c.id})\">Editar</button>
          <button class=\"btn-primary\" style=\"background:#DC2626; padding:.35rem .6rem; font-size:12px;\" onclick=\"deleteClient(${c.id})\">Eliminar</button>
        </div>
      `
      : `<span style=\"color:#9CA3AF;\">-</span>`;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class=\"table-cell\" style=\"padding:14px 18px;\">${c.name || '-'}</td>
      <td class=\"table-cell\" style=\"padding:14px 18px;\">${c.contact_person || '-'}</td>
      <td class=\"table-cell\" style=\"padding:14px 18px;\">${c.phone || '-'}</td>
      <td class=\"table-cell\" style=\"padding:14px 18px;\">${c.email || '-'}</td>
      <td class=\"table-cell\" style=\"padding:14px 18px;\">${c.document || '-'}</td>
      <td class=\"table-cell\" style=\"padding:14px 18px;\">${c.address || '-'}</td>
      <td class=\"table-cell\" style=\"padding:14px 18px;\">${actions}</td>
    `;
    tbody.appendChild(tr);
  });
}

function setupClientsSearch() {
  const input = document.getElementById('clientsSearch');
  if (!input) return;
  input.addEventListener('input', (e) => {
    const term = (e.target.value || '').trim().toLowerCase();
    const rows = filterClients(term);
    renderClientsTable(rows);
  });
}

function filterClients(term) {
  if (!term) return CLIENTS_DATA;
  return CLIENTS_DATA.filter(c => {
    const fields = [
      c.name,
      c.contact_person,
      c.phone,
      c.email,
      c.document,
      c.address,
    ];
    return fields.some(v => (v || '').toString().toLowerCase().includes(term));
  });
}

function loadClients() {
  fetch('/api/show-table-clients/', {
    headers: { 'X-Requested-With': 'XMLHttpRequest' }
  })
  .then(r => r.json())
  .then(data => {
    CLIENTS_DATA = (data.clients || []);
    const input = document.getElementById('clientsSearch');
    const term = input ? (input.value || '').trim().toLowerCase() : '';
    const rows = term ? filterClients(term) : CLIENTS_DATA;
    renderClientsTable(rows);
  })
  .catch(err => {
    console.error(err);
    const tbody = document.querySelector('.clients-tbody');
    if (tbody) tbody.innerHTML = '<tr><td class="table-cell" colspan="7" style="padding:18px;">Error al cargar clientes</td></tr>';
  });
}

function openClientDrawer() {
  document.getElementById('clientOverlay').style.display = 'block';
  document.getElementById('clientDrawer').classList.add('active');
}
function closeClientDrawer() {
  document.getElementById('clientOverlay').style.display = 'none';
  document.getElementById('clientDrawer').classList.remove('active');
  currentEditClientId = null;
  const title = document.querySelector('#clientDrawer h3');
  if (title) title.textContent = 'Crear cliente';
  const form = document.getElementById('clientForm');
  if (form) form.reset();
}

async function submitClient(evt) {
  if (evt) evt.preventDefault();
  const form = document.getElementById('clientForm');
  const payload = Object.fromEntries(new FormData(form).entries());
  const isEdit = !!currentEditClientId;
  const url = isEdit ? `/api/clients/${currentEditClientId}/update/` : '/api/clients/create/';

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken'),
        'X-Requested-With': 'XMLHttpRequest',
      },
      body: JSON.stringify(payload),
    });

    if (!res.ok) {
      let msg = 'Error al guardar.';
      try { const data = await res.json(); if (data.error) msg = data.error; } catch(_){}
      throw new Error(msg);
    }

    // Reset state
    currentEditClientId = null;
    const title = document.querySelector('#clientDrawer h3');
    if (title) title.textContent = 'Crear cliente';
    form.reset();
    closeClientDrawer();
    loadClients();
  } catch (err) {
    alert(err.message || 'Error al guardar.');
  }
}

async function editClient(id) {
  currentEditClientId = id;
  const title = document.querySelector('#clientDrawer h3');
  if (title) title.textContent = 'Editar cliente';
  openClientDrawer();
  try {
    const res = await fetch(`/api/clients/${id}/`, {
      headers: { 'X-Requested-With': 'XMLHttpRequest' }
    });
    if (!res.ok) throw new Error('No se pudo cargar el cliente');

    const data = await res.json();
    const c = data.client;
    const form = document.getElementById('clientForm');
    form.elements['name'].value = c.name || '';
    form.elements['contact_person'].value = c.contact_person || '';
    form.elements['phone'].value = c.phone || '';
    form.elements['email'].value = c.email || '';
    form.elements['document_type'].value = c.document_type || '';
    form.elements['document_number'].value = c.document_number || '';
    form.elements['address'].value = c.address || '';
  } catch (err) {
    alert(err.message || 'Error al cargar cliente');
  }
}

async function deleteClient(id) {
  if (!confirm('¿Seguro que deseas eliminar este cliente?')) return;
  try {
    const res = await fetch(`/api/clients/${id}/delete/`, {
      method: 'POST',
      headers: {
        'X-CSRFToken': getCookie('csrftoken'),
        'X-Requested-With': 'XMLHttpRequest',
      },
    });
    if (!res.ok) {
      let msg = 'Error al eliminar.';
      try { const data = await res.json(); if (data.error) msg = data.error; } catch(_){}
      throw new Error(msg);
    }
    loadClients();
  } catch (err) {
    alert(err.message || 'Error al eliminar.');
  }
}
</script>
{% endblock %}
