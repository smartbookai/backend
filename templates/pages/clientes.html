{% extends 'layouts/base.html' %}
{% block title %}Clientes | SBA{% endblock %}
{% block content %}

<style>
  /* ── Page layout ─────────────────────────────── */
  .clients-page { max-width: 100%; padding: 28px 24px 40px; }

  /* ── Search bar ──────────────────────────────── */
  .clients-search-wrap {
    position: relative;
    max-width: 480px;
  }
  .clients-search-wrap .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #9CA3AF;
    font-size: 15px;
    pointer-events: none;
  }
  .clients-search-wrap input {
    width: 100%;
    padding: 10px 14px 10px 40px;
    border: 1.5px solid #E5E7EB;
    border-radius: 12px;
    font-size: 14px;
    background: #fff;
    outline: none;
    transition: border-color .2s;
    box-sizing: border-box;
  }
  .clients-search-wrap input:focus { border-color: #7b3fa8; }

  /* ── Section labels ──────────────────────────── */
  .section-heading {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #9CA3AF;
    margin: 0 0 14px;
  }

  /* ── Featured clients row ────────────────────── */
  .featured-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }
  .featured-card {
    flex: 1 1 200px;
    max-width: 260px;
    background: linear-gradient(135deg, #7b3fa8 0%, #62328A 100%);
    border-radius: 18px;
    padding: 20px 20px 16px;
    color: #fff;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: 0 4px 18px rgba(98,50,138,.22);
    transition: transform .18s ease, box-shadow .18s ease;
    cursor: default;
  }
  .featured-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(98,50,138,.32);
  }
  .featured-card .fc-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0;
    flex-shrink: 0;
  }
  .featured-card .fc-name {
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .featured-card .fc-meta {
    font-size: 12px;
    opacity: .8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .featured-card .fc-stats {
    display: flex;
    gap: 14px;
    margin-top: 4px;
  }
  .featured-card .fc-stat {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .featured-card .fc-stat-val {
    font-size: 16px;
    font-weight: 700;
  }
  .featured-card .fc-stat-lbl {
    font-size: 10px;
    opacity: .72;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .featured-empty {
    color: #9CA3AF;
    font-size: 14px;
    padding: 10px 0;
  }

  /* ── Client cards grid ───────────────────────── */
  .clients-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .client-card {
    background: #fff;
    border-radius: 16px;
    border: 1.5px solid #F3F4F6;
    padding: 18px 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
  }
  .client-card:hover {
    border-color: #d4b8f0;
    box-shadow: 0 4px 18px rgba(98,50,138,.10);
    transform: translateY(-2px);
  }
  .client-card-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .client-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c9b0e8 0%, #9b6bc9 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .client-info { flex: 1; min-width: 0; }
  .client-name {
    font-size: 15px;
    font-weight: 700;
    color: #1F2937;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .client-doc {
    font-size: 12px;
    color: #9CA3AF;
  }
  .invoice-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #f3ecff;
    color: #62328A;
    font-size: 11px;
    font-weight: 600;
    border-radius: 20px;
    padding: 2px 9px;
    flex-shrink: 0;
  }
  .client-details {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 13px;
    color: #6B7280;
  }
  .client-details .detail-row {
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .client-details .detail-row i { font-size: 12px; color: #9CA3AF; flex-shrink: 0; }
  .client-card-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    padding-top: 8px;
    border-top: 1px solid #F3F4F6;
  }
  .btn-card-edit {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 13px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    border: 1.5px solid #d4b8f0;
    background: #fff;
    color: #62328A;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .btn-card-edit:hover { background: #f3ecff; border-color: #62328A; }
  .btn-card-del {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 13px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    border: 1.5px solid #fee2e2;
    background: #fff;
    color: #DC2626;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .btn-card-del:hover { background: #fef2f2; border-color: #DC2626; }

  /* ── Empty / loading state ───────────────────── */
  .clients-empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px 0;
    color: #9CA3AF;
    font-size: 15px;
  }
</style>

<section class="clients-page">

  <!-- Header row -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
    <div>
      <h1 style="font-size:26px;font-weight:700;margin:0 0 4px;">Clientes</h1>
      <p style="margin:0;color:#6B7280;font-size:14px;">Gestiona los clientes de tu empresa</p>
    </div>
    {% if user_role == 'admin' %}
    <button type="button" class="btn-primary" onclick="openClientDrawer()">
      <i class="bi bi-plus-lg me-1"></i> Nuevo cliente
    </button>
    {% endif %}
  </div>

  <!-- Search bar -->
  <div style="margin-bottom:30px;">
    <div class="clients-search-wrap">
      <i class="bi bi-search search-icon"></i>
      <input id="clientsSearch" type="text" placeholder="Buscar por nombre, email, teléfono...">
    </div>
  </div>

  <!-- Most frequent clients -->
  <div id="featured-section" style="margin-bottom:36px;">
    <p class="section-heading"><i class="bi bi-star-fill" style="color:#f59e0b;margin-right:6px;"></i>Clientes más frecuentes</p>
    <div class="featured-row" id="featured-row">
      <p class="featured-empty">Cargando...</p>
    </div>
  </div>

  <!-- All clients grid -->
  <div>
    <p class="section-heading"><i class="bi bi-people" style="margin-right:6px;"></i>Todos los clientes</p>
    <div class="clients-grid" id="clients-grid">
      <div class="clients-empty">Cargando...</div>
    </div>
  </div>

</section>

<!-- Overlay and Drawer -->
<div id="clientOverlay" class="overlay-mask" onclick="closeClientDrawer()"></div>
<aside id="clientDrawer" class="drawer" aria-hidden="true">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <h3 id="drawerTitle" style="margin:0;font-size:18px;">Crear cliente</h3>
    <button class="btn-secondary" onclick="closeClientDrawer()">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>
  <form id="clientForm" onsubmit="submitClient(event)">
    <div class="form-field">
      <label>Nombre <span style="color:#DC2626;">*</span></label>
      <input type="text" name="name" required>
    </div>
    <div class="form-field">
      <label>Persona de contacto</label>
      <input type="text" name="contact_person">
    </div>
    <div class="form-field">
      <label>Teléfono</label>
      <input type="text" name="phone">
    </div>
    <div class="form-field">
      <label>Email</label>
      <input type="email" name="email">
    </div>
    <div class="form-field">
      <label>Tipo de documento</label>
      <input type="text" name="document_type">
    </div>
    <div class="form-field">
      <label>Número de documento</label>
      <input type="text" name="document_number">
    </div>
    <div class="form-field">
      <label>Dirección</label>
      <input type="text" name="address">
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">
      <button type="button" class="btn-secondary" onclick="closeClientDrawer()">Cancelar</button>
      <button type="submit" class="btn-primary">Guardar</button>
    </div>
  </form>
</aside>

<script>
const IS_ADMIN = '{% if user_role == "admin" %}admin{% else %}other{% endif %}' === 'admin';
let currentEditClientId = null;
let CLIENTS_DATA = [];

document.addEventListener('DOMContentLoaded', function() {
  loadClients();
  document.getElementById('clientsSearch').addEventListener('input', function() {
    const term = this.value.trim().toLowerCase();
    renderGrid(filterClients(term));
  });
  const params = new URLSearchParams(window.location.search);
  if (params.get('openDrawer') === 'client') openClientDrawer();
});

/* ── helpers ─────────────────────────────────────────── */
function initial(name) {
  return (name || '?').trim()[0].toUpperCase();
}
function fmtMoney(val) {
  if (!val && val !== 0) return '—';
  return new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(val);
}
function filterClients(term) {
  if (!term) return CLIENTS_DATA;
  return CLIENTS_DATA.filter(c =>
    [c.name, c.contact_person, c.phone, c.email, c.document, c.address]
      .some(v => (v || '').toLowerCase().includes(term))
  );
}

/* ── featured strip ──────────────────────────────────── */
function renderFeatured(all) {
  const top = [...all]
    .filter(c => c.invoice_count > 0)
    .sort((a, b) => b.invoice_count - a.invoice_count)
    .slice(0, 4);

  const row = document.getElementById('featured-row');
  const section = document.getElementById('featured-section');

  if (!top.length) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';

  row.innerHTML = top.map(c => `
    <div class="featured-card">
      <div class="fc-avatar">${initial(c.name)}</div>
      <div>
        <div class="fc-name" title="${c.name}">${c.name}</div>
        <div class="fc-meta">${c.email || c.phone || '—'}</div>
      </div>
      <div class="fc-stats">
        <div class="fc-stat">
          <span class="fc-stat-val">${c.invoice_count}</span>
          <span class="fc-stat-lbl">Facturas</span>
        </div>
        <div class="fc-stat">
          <span class="fc-stat-val">${fmtMoney(c.total_invoiced)}</span>
          <span class="fc-stat-lbl">Facturado</span>
        </div>
      </div>
    </div>
  `).join('');
}

/* ── client cards grid ───────────────────────────────── */
function renderGrid(rows) {
  const grid = document.getElementById('clients-grid');
  if (!rows || rows.length === 0) {
    grid.innerHTML = '<div class="clients-empty"><i class="bi bi-person-x" style="font-size:32px;display:block;margin-bottom:10px;"></i>No hay clientes que coincidan.</div>';
    return;
  }

  grid.innerHTML = rows.map(c => {
    const actions = IS_ADMIN ? `
      <div class="client-card-actions">
        <button class="btn-card-edit" onclick="editClient(${c.id})">
          <i class="bi bi-pencil"></i> Editar
        </button>
        <button class="btn-card-del" onclick="deleteClient(${c.id})">
          <i class="bi bi-trash"></i> Eliminar
        </button>
      </div>` : '';

    const details = [
      c.contact_person ? `<div class="detail-row"><i class="bi bi-person"></i><span style="overflow:hidden;text-overflow:ellipsis;">${c.contact_person}</span></div>` : '',
      c.phone          ? `<div class="detail-row"><i class="bi bi-telephone"></i><span>${c.phone}</span></div>` : '',
      c.email          ? `<div class="detail-row"><i class="bi bi-envelope"></i><span style="overflow:hidden;text-overflow:ellipsis;">${c.email}</span></div>` : '',
      c.address        ? `<div class="detail-row"><i class="bi bi-geo-alt"></i><span style="overflow:hidden;text-overflow:ellipsis;">${c.address}</span></div>` : '',
    ].filter(Boolean).join('');

    return `
      <div class="client-card" data-id="${c.id}">
        <div class="client-card-top">
          <div class="client-avatar">${initial(c.name)}</div>
          <div class="client-info">
            <div class="client-name" title="${c.name}">${c.name}</div>
            <div class="client-doc">${c.document || '—'}</div>
          </div>
          <span class="invoice-badge"><i class="bi bi-receipt"></i> ${c.invoice_count}</span>
        </div>
        ${details ? `<div class="client-details">${details}</div>` : ''}
        ${actions}
      </div>`;
  }).join('');
}

/* ── load data ───────────────────────────────────────── */
function loadClients() {
  fetch('/api/show-table-clients/', { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
    .then(r => r.json())
    .then(data => {
      CLIENTS_DATA = data.clients || [];
      renderFeatured(CLIENTS_DATA);
      const term = document.getElementById('clientsSearch').value.trim().toLowerCase();
      renderGrid(term ? filterClients(term) : CLIENTS_DATA);
    })
    .catch(err => {
      console.error(err);
      document.getElementById('clients-grid').innerHTML =
        '<div class="clients-empty">Error al cargar clientes.</div>';
    });
}

/* ── drawer ──────────────────────────────────────────── */
function openClientDrawer() {
  document.getElementById('clientOverlay').style.display = 'block';
  document.getElementById('clientDrawer').classList.add('active');
}
function closeClientDrawer() {
  document.getElementById('clientOverlay').style.display = 'none';
  document.getElementById('clientDrawer').classList.remove('active');
  currentEditClientId = null;
  document.getElementById('drawerTitle').textContent = 'Crear cliente';
  document.getElementById('clientForm').reset();
}

/* ── CRUD ────────────────────────────────────────────── */
async function submitClient(evt) {
  evt.preventDefault();
  const form = document.getElementById('clientForm');
  const payload = Object.fromEntries(new FormData(form).entries());
  const isEdit = !!currentEditClientId;
  const url = isEdit ? `/api/clients/${currentEditClientId}/update/` : '/api/clients/create/';
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken'), 'X-Requested-With': 'XMLHttpRequest' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      let msg = 'Error al guardar.';
      try { const d = await res.json(); if (d.error) msg = d.error; } catch(_){}
      throw new Error(msg);
    }
    closeClientDrawer();
    loadClients();
  } catch (err) { alert(err.message || 'Error al guardar.'); }
}

async function editClient(id) {
  currentEditClientId = id;
  document.getElementById('drawerTitle').textContent = 'Editar cliente';
  openClientDrawer();
  try {
    const res = await fetch(`/api/clients/${id}/`, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
    if (!res.ok) throw new Error('No se pudo cargar el cliente');
    const { client: c } = await res.json();
    const f = document.getElementById('clientForm');
    f.elements['name'].value          = c.name || '';
    f.elements['contact_person'].value = c.contact_person || '';
    f.elements['phone'].value          = c.phone || '';
    f.elements['email'].value          = c.email || '';
    f.elements['document_type'].value  = c.document_type || '';
    f.elements['document_number'].value = c.document_number || '';
    f.elements['address'].value        = c.address || '';
  } catch (err) { alert(err.message || 'Error al cargar cliente'); }
}

async function deleteClient(id) {
  if (!confirm('¿Seguro que deseas eliminar este cliente?')) return;
  try {
    const res = await fetch(`/api/clients/${id}/delete/`, {
      method: 'POST',
      headers: { 'X-CSRFToken': getCookie('csrftoken'), 'X-Requested-With': 'XMLHttpRequest' },
    });
    if (!res.ok) {
      let msg = 'Error al eliminar.';
      try { const d = await res.json(); if (d.error) msg = d.error; } catch(_){}
      throw new Error(msg);
    }
    loadClients();
  } catch (err) { alert(err.message || 'Error al eliminar.'); }
}
</script>
{% endblock %}
