{% extends 'layouts/base.html' %}
{% block title %}Clientes | SBA{% endblock %}
{% block content %}
<section>
  <div style="max-width:100%;margin:24px auto 0;padding:0 16px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:12px;">
      <div>
        <h1 style="font-size:28px;font-weight:700;margin:24px 0 6px 0;">Clientes</h1>
        <div style="color:#6B7280;margin-bottom:20px;">De la compañía</div>
      </div>
    </div>

    <div class="card table-card" style="padding:0;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;">
        <div>
          <h2 style="font-size:16px;margin:0;">Listado</h2>
        </div>
      </div>

      <div class="table-container">
        <table class="table" style="width:100%;border-collapse:collapse;">
          <thead>
            <tr>
              <th class="table-header" style="padding:14px 18px;">Nombre</th>
              <th class="table-header" style="padding:14px 18px;">Contacto</th>
              <th class="table-header" style="padding:14px 18px;">Teléfono</th>
              <th class="table-header" style="padding:14px 18px;">Email</th>
              <th class="table-header" style="padding:14px 18px;">Documento</th>
              <th class="table-header" style="padding:14px 18px;">Dirección</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="table-cell" colspan="6" style="color:#6B7280;padding:18px;">Próximamente</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</section>
{% endblock %}
