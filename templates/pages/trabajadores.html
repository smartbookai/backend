{% extends 'layouts/base.html' %}
{% block title %}Trabajadores | SBA{% endblock %}
{% block content %}
<section>
  <div style="max-width:100%;margin:24px auto 0;padding:0 16px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:12px;">
      <div>
        <h1 style="font-size:28px;font-weight:700;margin:24px 0 6px 0;">Trabajadores</h1>
        <div style="color:#6B7280;margin-bottom:20px;">De la compañía</div>
      </div>
      {% if request.user.company_user.role == 'admin' %}
       <button type="button" class="btn-primary" onclick="openWorkerDrawer()">Crear nuevo</button>
      {% endif %}
    </div>

    <div class="card table-card" style="padding:0;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;">
        <div>
          <h2 style="font-size:16px;margin:0;">Listado</h2>
        </div>
        <!-- Acciones opcionales -->
      </div>

      <div class="table-container">
        <table class="table" style="width:100%;border-collapse:collapse;">
          <thead>
            <tr>
              <th class="table-header" style="padding:14px 18px;">Foto</th>
              <th class="table-header" style="padding:14px 18px;">Nombre</th>
              <th class="table-header" style="padding:14px 18px;">Apellido</th>
              <th class="table-header" style="padding:14px 18px;">Email</th>
              <th class="table-header" style="padding:14px 18px;">Teléfono</th>
              <th class="table-header" style="padding:14px 18px;">Fecha Nac.</th>
              <th class="table-header" style="padding:14px 18px;">Dirección</th>
              <th class="table-header" style="padding:14px 18px;">Rol</th>
              <th class="table-header text-right" style="padding:14px 18px;">Acciones</th>
            </tr>
          </thead>
          <tbody class="workers-tbody">

          </tbody>
        </table>
      </div>
    </div>
  </div>
</section>



<script>
const IS_ADMIN = '{% if request.user.company_user.role == "admin" %}admin{% else %}other{% endif %}' === 'admin';

document.addEventListener('DOMContentLoaded', function() {
  loadWorkers();
});

function loadWorkers() {
  fetch('/api/show-table-workers/', {
    headers: { 'X-Requested-With': 'XMLHttpRequest' }
  })
  .then(r => r.json())
  .then(data => {
    const tbody = document.querySelector('.workers-tbody');
    if (!tbody) return;
    tbody.innerHTML = '';

    const rows = data.workers || [];
    if (rows.length === 0) {
      tbody.innerHTML = '<tr><td class="table-cell" colspan="9" style="color:#6B7280;padding:18px;">No hay trabajadores registrados.</td></tr>';
      return;
    }

    rows.forEach(worker => {
      const actions = IS_ADMIN
        ? `
          <div style="display:flex; gap:8px; justify-content:center;">
            <button class="btn-secondary"
                    style="padding:.35rem .6rem; font-size:12px;"
                    onclick="editSupplier(${worker.id})">
              Editar
            </button>
            <button class="btn-primary"
                    style="background:#DC2626; padding:.35rem .6rem; font-size:12px;"
                    onclick="deleteSupplier(${worker.id})">
              Eliminar
            </button>
          </div>
        `
        : `<span style="color:#9CA3AF;">-</span>`;

      const photoCell = worker.profile_picture
        ? `<img src="${worker.profile_picture}" alt="Foto" style="width:32px;height:32px;border-radius:9999px;object-fit:cover;">`
        : `<div style="width:32px;height:32px;border-radius:9999px;background:#E5E7EB;display:inline-block;"></div>`;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="table-cell" style="padding:14px 18px;">${photoCell}</td>
        <td class="table-cell" style="padding:14px 18px;">${worker.first_name || '-'}</td>
        <td class="table-cell" style="padding:14px 18px;">${worker.last_name || '-'}</td>
        <td class="table-cell" style="padding:14px 18px;">${worker.email || '-'}</td>
        <td class="table-cell" style="padding:14px 18px;">${worker.phone || '-'}</td>
        <td class="table-cell" style="padding:14px 18px;">${worker.date_of_birth || '-'}</td>
        <td class="table-cell" style="padding:14px 18px;">${worker.address || '-'}</td>
        <td class="table-cell" style="padding:14px 18px;">${(worker.role || '').charAt(0).toUpperCase() + (worker.role || '').slice(1)}</td>
        <td class="table-cell text-right" style="padding:14px 18px;">${actions}</td>
      `;
      tbody.appendChild(tr);
    });
  })
  .catch(err => {
    console.error(err);
    const tbody = document.querySelector('.workers-tbody');
    if (tbody) tbody.innerHTML = '<tr><td class="table-cell" colspan="9" style="padding:18px;">Error al cargar trabajadores</td></tr>';
  });
}
</script>
{% endblock %}
