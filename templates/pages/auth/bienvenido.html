{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido | SBA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="{% static 'images/logo-symbol.svg' %}" type="image/x-icon">
</head>
<body>

<img src="{% static 'images/sba_login_head_logo.jpeg' %}" alt="SBA Logo" class="corner-logo">

<div class="welcome-shell">
    <img src="{% static 'images/sba_login_text_logo.jpeg' %}" alt="SBA - SmartBook AI" class="welcome-logo">

    <div class="welcome-card">
        <p class="welcome-emoji">🎉</p>
        <h1 class="welcome-title">Enhorabuena, ya formas parte<br>del grupo SmartBook</h1>
        <p class="welcome-sub">
            Gracias por confiar en nosotros.<br>
            Bienvenido a la era de la automatización.
        </p>
        <p class="welcome-cta">¿Empezamos?</p>
        <a href="{% url 'login_page' %}" class="btn-login">Login</a>
    </div>
</div>

<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .corner-logo {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 170px;
        height: auto;
    }

    .welcome-shell {
        text-align: center;
        padding: 40px 24px;
    }

    .welcome-logo {
        max-width: 200px;
        height: auto;
        margin-bottom: 32px;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    .welcome-card {
        max-width: 480px;
        margin: 0 auto;
    }

    .welcome-emoji {
        font-size: 48px;
        margin-bottom: 20px;
    }

    .welcome-title {
        font-size: 22px;
        font-weight: 700;
        color: #111;
        line-height: 1.35;
        margin-bottom: 14px;
    }

    .welcome-sub {
        font-size: 15px;
        color: #555;
        line-height: 1.6;
        margin-bottom: 36px;
    }

    .welcome-cta {
        font-size: 13px;
        color: #888;
        font-weight: 500;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 10px;
    }

    .btn-login {
        display: inline-block;
        background: #111;
        color: #fff;
        text-decoration: none;
        padding: 12px 48px;
        font-size: 15px;
        font-weight: 600;
        border-radius: 2px;
        transition: background 0.2s;
    }

    .btn-login:hover {
        background: #000;
        color: #fff;
    }

    @media (max-width: 768px) {
        .corner-logo { width: 80px; top: 15px; left: 15px; }
    }

    @media (max-width: 480px) {
        .corner-logo { position: static; display: block; margin: 0 auto 20px; width: 100px; }
        .welcome-title { font-size: 18px; }
    }
</style>

</body>
</html>
